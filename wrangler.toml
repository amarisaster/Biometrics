name = "biometrics-cloud"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Secrets needed (set via wrangler secret put):
# - BIOMETRICS_API_KEY
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - GOOGLE_FIT_REFRESH_TOKEN (bootstrap only; KV 'google_fit_refresh_token' takes priority)

[[kv_namespaces]]
binding = "TOKENS"
id = "e7a9b0dbc4cd4ad9b078254dc74b66dc"

# Cron trigger - sync every 15 minutes (matches Health Sync interval)
[triggers]
crons = ["*/15 * * * *"]
